# ─────────────────────────────────────────────────────────
# Rune — 1-Minute Self-Host (no source code needed)
#
# Usage:
#   curl -O https://raw.githubusercontent.com/praveenraj-sk/Rune/main/docker-compose.prod.yml
#   docker compose -f docker-compose.prod.yml up -d
#
# Then install the SDK:
#   npm install @runeauth/sdk
#
# Default dev API key: rune-dev-key
# Change JWT_SECRET and API_KEY before going to production.
# ─────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: rune-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rune
      POSTGRES_PASSWORD: runepassword
      POSTGRES_DB: runedb
    volumes:
      - rune_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rune -d runedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rune:
    image: ghcr.io/praveenraj-sk/rune:latest
    container_name: rune-engine
    restart: unless-stopped
    ports:
      - "4078:4078"
    environment:
      DATABASE_URL: postgres://rune:runepassword@postgres:5432/runedb
      API_KEY: rune-dev-key        # change in production
      JWT_SECRET: change-me-32chars-minimum   # change in production
      PORT: 4078
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4078/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  rune_pgdata:
