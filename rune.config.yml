# Rune Config
# Define your authorization model here.
# This file lives in your repo — version-controlled, code-reviewed, deployed with your app.

version: 1

resources:
  document:
    roles:
      owner:
        actions: [read, edit, delete, share]
      editor:
        inherits: [viewer]
        actions: [edit, share]
      viewer:
        actions: [read]

    conditions:
      office_hours:
        when:
          time_between: ["09:00", "17:00"]
        apply_to: [edit, delete]

      draft_only_edit:
        when:
          resource.status: "draft"
        apply_to: [edit]

  project:
    roles:
      admin:
        inherits: [member]
        actions: [manage, invite, delete]
      member:
        actions: [read, edit]
